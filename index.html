<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="./favicon.png" />

    <!-- Google Search Console ownership verification -->
    <meta name="google-site-verification" content="vRP7k3plPqjEVr-BLY-zn3VAmnsu0_XNHSqNvJg5e5M" />

    <title>Brillore Holdings | Precision. Compliance. Reliability.</title>
    <meta
      name="description"
      content="Brillore Holdings provides reliable metrology, inspection, fire safety, and marine technical support services for oil, gas, industrial, and marine operations in Tanzania."
    />
    <meta name="theme-color" content="#050505" />
    <link rel="canonical" href="https://brillore.co.tz/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Brillore Holdings" />
    <meta property="og:url" content="https://brillore.co.tz/" />
    <meta property="og:title" content="Brillore Holdings | Metrology, Inspection & Technical Services" />
    <meta
      property="og:description"
      content="Dependable metrology, inspection, fire safety, and marine technical support services for critical industrial operations."
    />
    <meta property="og:image" content="https://brillore.co.tz/assets/logo/brilore-logo.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Brillore Holdings | Metrology, Inspection & Technical Services" />
    <meta
      name="twitter:description"
      content="Dependable metrology, inspection, fire safety, and marine technical support services for critical industrial operations."
    />
    <meta name="twitter:image" content="https://brillore.co.tz/assets/logo/brilore-logo.png" />

    <!-- Structured data: Organization / LocalBusiness (helps Google show business info) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Brillore Holdings",
        "description": "Brillore Holdings is a technical service company specializing in metrology, inspection, and industrial support services for oil and gas measurements, fire safety systems, and marine operations.",
        "url": "https://brillore.co.tz/",
        "logo": "https://brillore.co.tz/assets/logo/brilore-logo.png",
        "image": "https://brillore.co.tz/assets/logo/brilore-logo.png",
        "telephone": "+255773249292",
        "email": "info@brillore.co.tz",
        "foundingDate": "2020",
        "address": {
          "@type": "PostalAddress",
          "addressLocality": "Dar es Salaam",
          "addressCountry": "TZ"
        },
        "areaServed": "TZ",
        "knowsAbout": ["Metrology", "Inspection", "Fire Safety", "Marine Technical Support", "Oil and Gas Measurement"]
      }
    </script>

    <!-- Fontshare: architectural display face + highly legible UI/body face -->
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link
      href="https://api.fontshare.com/v2/css?f[]=clash-display@400,500,600&f[]=satoshi@400,500,600,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Apply the saved theme before paint to avoid a flash of the wrong theme. -->
    <script>
      try {
        if (localStorage.getItem("brillore-theme") === "light") {
          document.documentElement.classList.add("light");
        }
      } catch (e) {}
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
