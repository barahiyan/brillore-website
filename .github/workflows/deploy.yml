name: Build & Deploy to icdsoft

# Kila push kwenye main: jenga tovuti na peleka kwa FTP kwenye icdsoft.
on:
  push:
    branches: [main]
  workflow_dispatch: # inaruhusu ku-trigger kwa mkono kutoka GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # lftp ni madhubuti zaidi kuliko basic-ftp kwa FTPS dhidi ya icdsoft
      # (inashughulikia TLS session reuse, hivyo hakuna ECONNRESET kwenye data socket).
      - name: Deploy to icdsoft via lftp (FTPS)
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_REMOTE_DIR: ${{ secrets.FTP_REMOTE_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y lftp
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" "$FTP_SERVER" -e "
            set ftp:ssl-force true;
            set ftp:ssl-protect-data true;
            set ssl:verify-certificate no;
            set ftp:passive-mode true;
            set net:max-retries 3;
            set net:timeout 15;
            mirror --reverse --verbose --parallel=2 ./dist/ '$FTP_REMOTE_DIR';
            bye
          "
